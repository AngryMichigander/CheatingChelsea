version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - echo "Build started on `date`"
        - echo "Configuring environment variables..."
        - echo "YOUTUBE_API_KEY value is ${YOUTUBE_API_KEY}"
        - echo "YOUTUBE_API_KEY=${YOUTUBE_API_KEY}" > .env.production
        - echo "Contents of .env.production file"
        - cat .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*