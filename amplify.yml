version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - echo "Build started on `date`"
        - echo "Available environment variables:"
        - printenv | grep -E "(YOUTUBE|AMPLIFY)" || echo "No relevant env vars found"
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*